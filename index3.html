<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VDA Auditor">
<meta name="theme-color" content="#0f172a">
<title>VDA 6.3 Auditor v6</title>
<style>
:root{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--accent:#38bdf8;--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;--border:#334155;--r:14px;--rs:8px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100dvh;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:between;gap:12px;z-index:10;}
.tb-title{font-size:16px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.tb-actions{display:flex;gap:8px;}
.btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all 0.2s;}
.btn:active{transform:scale(0.96);background:var(--border);}
.btn-primary{background:var(--accent);color:var(--bg);border-color:var(--accent);}
.btn-primary:active{background:#0284c7;}
.btn-icon{padding:8px;border-radius:var(--rs);width:36px;height:36px;justify-content:center;}
.main-content{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px;-webkit-overflow-scrolling:touch;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;}
.card-title{font-size:14px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;display:flex;align-items:center;justify-content:between;}
.aud-list{display:flex;flex-direction:column;gap:10px;}
.aud-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:12px;cursor:pointer;position:relative;transition:border-color 0.2s;}
.aud-item.active{border-color:var(--accent);}
.aud-item-title{font-size:14px;font-weight:600;margin-bottom:4px;}
.aud-item-meta{font-size:11px;color:var(--text3);display:flex;gap:12px;}
.badge{background:var(--bg3);color:var(--text2);padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;}
.badge-success{background:#10b98120;color:#10b981;}
.grid-p{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:8px;}
.btn-p{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:12px 6px;text-align:center;cursor:pointer;}
.btn-p.active{background:var(--accent);color:var(--bg);border-color:var(--accent);}
.btn-p-num{font-size:14px;font-weight:700;display:block;}
.btn-p-txt{font-size:10px;color:var(--text3);display:block;margin-top:2px;}
.btn-p.active .btn-p-txt{color:var(--bg);opacity:0.8;}
.q-card{display:none;flex-direction:column;gap:14px;}
.q-card.active{display:flex;}
.q-header{display:flex;justify-content:between;align-items:start;gap:12px;}
.q-id{font-size:18px;font-weight:800;color:var(--accent);background:var(--bg);border:1px solid var(--border);padding:4px 10px;border-radius:var(--rs);line-height:1;}
.q-desc{font-size:14px;font-weight:500;line-height:1.4;flex:1;}
.scores{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.btn-sc{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:10px;text-align:center;font-size:15px;font-weight:700;cursor:pointer;color:var(--text2);}
.btn-sc.active[data-v="10"]{background:#10b981;color:var(--bg);border-color:#10b981;}
.btn-sc.active[data-v="8"]{background:#a3e635;color:var(--bg);border-color:#a3e635;}
.btn-sc.active[data-v="6"]{background:#f59e0b;color:var(--bg);border-color:#f59e0b;}
.btn-sc.active[data-v="4"]{background:#f43f5e;color:var(--bg);border-color:#f43f5e;}
.btn-sc.active[data-v="0"]{background:#e11d48;color:var(--text);border-color:#e11d48;}
.btn-sc.active[data-v="na"]{background:var(--bg3);color:var(--text);border-color:var(--text3);}
.field-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;}
.input-area{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:10px;position:relative;}
.input-area textarea{width:100%;background:transparent;border:0;outline:0;color:var(--text);font-family:inherit;font-size:13px;resize:none;min-height:60px;line-height:1.4;}
.input-actions{display:flex;justify-content:end;gap:8px;margin-top:6px;border-top:1px solid var(--border);padding-top:6px;}
.btn-mic{background:transparent;border:0;color:var(--text3);cursor:pointer;padding:4px;display:flex;align-items:center;justify-content:center;border-radius:50%;width:28px;height:28px;}
.btn-mic.listening{color:#ef4444;background:#ef444420;animation:pulse 1.5s infinite;}
@keyframes pulse{0%{transform:scale(1);}50%{transform:scale(1.1);}100%{transform:scale(1);}}
.nav-q{display:flex;justify-content:between;gap:12px;margin-top:4px;}
.progress-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:2px;}
.progress-fill{height:100%;background:var(--accent);width:0%;transition:width 0.3s;}
.h-list{display:flex;flex-direction:column;gap:8px;max-height:220px;overflow-y:auto;}
.h-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:10px;font-size:12px;}
.h-top{display:flex;justify-content:between;color:var(--text3);font-weight:700;font-size:10px;margin-bottom:4px;}
.h-ia{margin-top:6px;background:#38bdf810;border-left:2px solid var(--accent);padding:6px 8px;border-radius:0 var(--rs) var(--rs) 0;color:var(--text);}
.h-ia-loading{color:var(--text3);font-style:italic;display:flex;align-items:center;gap:6px;}
.h-ia-loading::before{content:'';width:10px;height:10px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin 0.6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.mbg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,0.8);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;padding:16px;}
.mbg.open{opacity:1;pointer-events:auto;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);width:100%;max-width:400px;padding:20px;box-shadow:0 20px 25px -5px rgba(0,0,0,0.5);transform:scale(0.95);transition:transform 0.2s;display:flex;flex-direction:column;gap:14px;}
.mbg.open .modal{transform:scale(1);}
.mh{display:flex;justify-content:between;align-items:center;}
.mt{font-size:16px;font-weight:700;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:#38bdf8;color:#0f172a;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:700;box-shadow:0 10px 15px -3px rgba(0,0,0,0.3);z-index:200;transition:transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275);display:flex;align-items:center;gap:8px;}
.toast.show{transform:translateX(-50%) translateY(0);}
.img-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px;}
.img-wrap{position:relative;aspect-ratio:1;border-radius:var(--rs);overflow:hidden;border:1px solid var(--border);background:var(--bg);}
.img-wrap img{width:100%;height:100%;object-fit:cover;}
.img-del{position:absolute;top:2px;right:2px;background:rgba(225,29,72,0.9);color:white;border:0;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="tb-title" id="app-title">VDA 6.3 Proceso v6</div>
    <div class="tb-actions">
      <button class="btn" onclick="abrirModalImportar()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      </button>
      <button class="btn" onclick="exportarTodo()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
      </button>
      <button class="btn btn-primary" onclick="nuevaAuditoria()">+ Nueva</button>
    </div>
  </div>
  <div class="main-content">
    <div class="card" id="card-auditorias">
      <div class="card-title">Auditorías Abiertas</div>
      <div class="aud-list" id="lista-auditorias"></div>
    </div>
    <div class="card" id="card-bloques" style="display:none;">
      <div class="card-title">Bloques VDA 6.3</div>
      <div class="grid-p" id="grid-bloques"></div>
    </div>
    <div class="card" id="card-preguntas" style="display:none;">
      <div class="progress-bar"><div class="progress-fill" id="p-bar"></div></div>
      <div class="card-title" style="margin-top:8px;">
        <span id="txt-bloque-act">Pregunta</span>
        <span class="badge badge-success" id="lbl-cumplimiento">-</span>
      </div>
      <div id="contenedor-preguntas"></div>
    </div>
    <div class="card" id="card-hallazgos-lista" style="display:none;">
      <div class="card-title">
        <span>Historial de Hallazgos</span>
        <button class="btn" style="padding:4px 8px;font-size:11px;" onclick="analizarTodosPendientes()">Analizar pendientes con IA</button>
      </div>
      <div class="h-list" id="lista-hallazgos-global"></div>
    </div>
  </div>
</div>

<script>
// BASE DE DATOS DE PREGUNTAS VDA 6.3
const ESTRUCTURA = [
  {id:"P2", name:"Análisis del proyecto", qs:[
    {id:"P2.1", desc:"¿Se especifican los requisitos del producto y proceso?"},
    {id:"P2.2", desc:"¿Se evalúa la viabilidad del desarrollo tecnológico?"},
    {id:"P2.3", desc:"¿Están planificadas las etapas del proyecto?"},
    {id:"P2.4", desc:"¿Se gestionan los recursos y capacidades?"}
  ]},
  {id:"P3", name:"Planificación del desarrollo", qs:[
    {id:"P3.1", desc:"¿Están detallados los planes de desarrollo de producto?"},
    {id:"P3.2", desc:"¿Se contemplan los métodos de análisis de riesgos (FMEA)?"},
    {id:"P3.3", desc:"¿Está planificada la cadena de suministro?"}
  ]},
  {id:"P4", name:"Realización del desarrollo", qs:[
    {id:"P4.1", desc:"¿Se validan los prototipos y primeras muestras?"},
    {id:"P4.2", desc:"¿El proceso productivo real refleja el diseño?"},
    {id:"P4.3", desc:"¿Las instalaciones cumplen los requisitos?"}
  ]},
  {id:"P5", name:"Gestión de proveedores", qs:[
    {id:"P5.1", desc:"¿Se seleccionan proveedores con criterios de calidad?"},
    {id:"P5.2", desc:"¿Se monitoriza el desempeño de la cadena externa?"},
    {id:"P5.3", desc:"¿Se controlan las mercancías entrantes adecuadamente?"}
  ]},
  {id:"P6", name:"Producción en serie", qs:[
    {id:"P6.1", desc:"¿El traspaso de desarrollo a serie está controlado?"},
    {id:"P6.2", desc:"¿Se controlan los parámetros críticos del proceso?"},
    {id:"P6.3", desc:"¿El personal operativo está cualificado?"},
    {id:"P6.4", desc:"¿Se realiza el mantenimiento preventivo de equipos?"},
    {id:"P6.5", desc:"¿El almacenamiento resguarda la integridad?"}
  ]},
  {id:"P7", name:"Atención al cliente", qs:[
    {id:"P7.1", desc:"¿Se miden los índices de satisfacción de entregas?"},
    {id:"P7.2", desc:"¿Se gestionan las reclamaciones de forma rápida (8D)?"},
    {id:"P7.3", desc:"¿Existe análisis de fallos en piezas de campo?"}
  ]}
];

let data = { auditorias: [] };
let currentAudId = null;
let currentBlkId = "P2";
let currentQIdx = 0;
let recognition = null;
let currentTargetTextareaId = null;

// INICIALIZACIÓN COMPATIBLE DE RECONOCIMIENTO DE VOZ CRUZA-PLATAFORMAS (PC & iPHONE)
function initSpeechRecognition() {
  if (recognition) return; // Ya inicializado
  
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    console.warn("Este navegador o dispositivo no soporta reconocimiento de voz nativo.");
    return;
  }
  
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.lang = 'es-ES';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
  
  recognition.onstart = function() {
    if (currentTargetTextareaId) {
      const btn = document.getElementById('mic-' + currentTargetTextareaId);
      if (btn) btn.classList.add('listening');
    }
  };
  
  recognition.onresult = function(event) {
    const resultText = event.results[0][0].transcript;
    if (currentTargetTextareaId) {
      const tx = document.getElementById(currentTargetTextareaId);
      if (tx) {
        tx.value = (tx.value + " " + resultText).trim();
        tx.dispatchEvent(new Event('input'));
      }
    }
  };
  
  recognition.onerror = function(e) {
    console.error("Error en Speech API:", e.error);
    toast("Micro: " + (e.error === 'not-allowed' ? 'Permiso denegado' : e.error));
    stopMicUI();
  };
  
  recognition.onend = function() {
    stopMicUI();
  };
}

function stopMicUI() {
  document.querySelectorAll('.btn-mic').forEach(b => b.classList.remove('listening'));
}

function toggleDictado(textareaId) {
  // Inicialización bajo demanda forzada por eventos táctiles de iOS/Android y clics de PC
  initSpeechRecognition();
  
  if (!recognition) {
    toast("Tu dispositivo no soporta dictado por voz");
    return;
  }
  
  if (document.getElementById('mic-' + textareaId).classList.contains('listening')) {
    recognition.stop();
    return;
  }
  
  // Detener cualquier escucha previa por seguridad
  recognition.stop();
  currentTargetTextareaId = textareaId;
  
  try {
    recognition.start();
  } catch(e) {
    // Captura excepciones si ya estaba corriendo internamente
    recognition.stop();
    setTimeout(() => { recognition.start(); }, 200);
  }
}

// PERSISTENCIA LOCALSTORAGE
function load(){
  const s = localStorage.getItem('vda63_data');
  if(s){ try{ data = JSON.parse(s); }catch(e){ data = {auditorias:[]}; } }
}
function save(){ localStorage.setItem('vda63_data', JSON.stringify(data)); }

function init(){
  load();
  renderAuditorias();
  if(data.auditorias.length > 0){
    seleccionarAuditoria(data.auditorias[data.auditorias.length - 1].id);
  }
  // Registro temprano de gestos para habilitar audio en Safari/Chrome
  window.addEventListener('click', initSpeechRecognition, { once: true });
  window.addEventListener('touchstart', initSpeechRecognition, { once: true });
}

function toast(m){
  const t = document.getElementById('toast');
  if(!t){
    const d = document.createElement('div'); d.id='toast'; d.className='toast';
    document.body.appendChild(d);
  }
  const el = document.getElementById('toast');
  el.innerText = m; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 3000);
}

function nuevaAuditoria(){
  const prov = prompt("Nombre del Proveedor / Línea / Planta:");
  if(!prov) return;
  const a = {
    id: 'aud_' + Date.now(),
    proveedor: prov,
    fecha: new Date().toLocaleDateString('es-ES'),
    scores: {},
    notas: {},
    imagenes: {}, // Estructura id_pregunta -> array de base64 compactos
    hallazgos: []
  };
  data.auditorias.push(a); save(); renderAuditorias(); seleccionarAuditoria(a.id);
}

function eliminarAuditoria(id, e){
  if(e) e.stopPropagation();
  if(!confirm("¿Seguro que deseas eliminar esta auditoría por completo?")) return;
  data.auditorias = data.auditorias.filter(a=>a.id!==id);
  if(currentAudId === id) currentAudId = null;
  save(); renderAuditorias();
  if(currentAudId==null){
    document.getElementById('card-bloques').style.display='none';
    document.getElementById('card-preguntas').style.display='none';
    document.getElementById('card-hallazgos-lista').style.display='none';
  }
}

function renderAuditorias(){
  const cont = document.getElementById('lista-auditorias'); cont.innerHTML='';
  data.auditorias.forEach(a=>{
    const item = document.createElement('div');
    item.className = `aud-item ${a.id===currentAudId?'active':''}`;
    item.onclick = ()=>seleccionarAuditoria(a.id);
    
    // Calcular score global de esta auditoría
    let sum=0, count=0;
    ESTRUCTURA.forEach(b=>{
      b.qs.forEach(q=>{
        const v = a.scores[q.id];
        if(v!==undefined && v!=='na'){ sum+=parseInt(v); count++; }
      });
    });
    const pct = count>0 ? Math.round((sum/(count*10))*100) : null;
    const badge = pct!==null ? `<span class="badge badge-success" style="position:absolute;top:12px;right:40px;">${pct}%</span>` : '';
    
    item.innerHTML = `
      <div class="aud-item-title">${a.proveedor}</div>
      <div class="aud-item-meta"><span>📅 ${a.fecha}</span><span>📋 VDA 6.3</span></div>
      ${badge}
      <button class="btn-mic" style="position:absolute;top:8px;right:6px;color:var(--text3);" onclick="eliminarAuditoria('${a.id}', event)">✕</button>
    `;
    cont.appendChild(item);
  });
}

function seleccionarAuditoria(id){
  currentAudId = id; renderAuditorias();
  document.getElementById('card-bloques').style.display='block';
  document.getElementById('card-preguntas').style.display='block';
  document.getElementById('card-hallazgos-lista').style.display='block';
  renderBloques(); cargarPregunta(); renderHallazgosGlobal();
}

function renderBloques(){
  const cont = document.getElementById('grid-bloques'); cont.innerHTML='';
  const a = data.auditorias.find(x=>x.id===currentAudId);
  ESTRUCTURA.forEach(b=>{
    const btn = document.createElement('div');
    btn.className = `btn-p ${b.id===currentBlkId?'active':''}`;
    btn.onclick = ()=>{ currentBlkId=b.id; currentQIdx=0; renderBloques(); cargarPregunta(); };
    
    let respondidas=0;
    b.qs.forEach(q=>{ if(a.scores[q.id]!==undefined) respondidas++; });
    
    btn.innerHTML = `<span class="btn-p-num">${b.id}</span><span class="btn-p-txt">${respondidas}/${b.qs.length}</span>`;
    cont.appendChild(btn);
  });
  calcularCumplimientoGlobal();
}

function calcularCumplimientoGlobal(){
  const a = data.auditorias.find(x=>x.id===currentAudId); if(!a) return;
  let sum=0, count=0;
  ESTRUCTURA.forEach(b=>{
    b.qs.forEach(q=>{
      const v = a.scores[q.id];
      if(v!==undefined && v!=='na'){ sum+=parseInt(v); count++; }
    });
  });
  const el = document.getElementById('lbl-cumplimiento');
  if(count===0){ el.innerText='-'; el.style.background='var(--bg3)'; el.style.color='var(--text2)'; }
  else {
    const pct = Math.round((sum/(count*10))*100);
    el.innerText = `Total: ${pct}%`;
    if(pct>=90){ el.style.background='#10b98120'; el.style.color='#10b981'; }
    else if(pct>=80){ el.style.background='#a3e63520'; el.style.color='#a3e635'; }
    else { el.style.background='#e11d4820'; el.style.color='#e11d48'; }
  }
}

function cargarPregunta(){
  const blk = ESTRUCTURA.find(b=>b.id===currentBlkId);
  document.getElementById('txt-bloque-act').innerText = `${blk.id} - ${blk.name}`;
  
  // Actualizar barra progreso bloque
  const pctB = Math.round(((currentQIdx + 1) / blk.qs.length) * 100);
  document.getElementById('p-bar').style.width = `${pctB}%`;
  
  const cont = document.getElementById('contenedor-preguntas'); cont.innerHTML='';
  const q = blk.qs[currentQIdx];
  const a = data.auditorias.find(x=>x.id===currentAudId);
  
  const card = document.createElement('div');
  card.className = "q-card active";
  
  const scoreAct = a.scores[q.id] || '';
  const notaAct = a.notas[q.id] || '';
  const fotosAct = a.imagenes ? (a.imagenes[q.id] || []) : [];
  
  // Render de miniaturas de fotos
  let htmlFotos = '';
  fotosAct.forEach((f, idx)=>{
    htmlFotos += `
      <div class="img-wrap">
        <img src="${f}" onclick="vistaPreviaImagen('${q.id}', ${idx})">
        <button class="img-del" onclick="eliminarImagen('${q.id}', ${idx})">✕</button>
      </div>
    `;
  });
  
  card.innerHTML = `
    <div class="q-header">
      <div class="q-id">${q.id}</div>
      <div class="q-desc">${q.desc}</div>
    </div>
    <div class="scores">
      <div class="btn-sc ${scoreAct==='10'?'active':''}" data-v="10" onclick="evaluar('${q.id}','10')">10</div>
      <div class="btn-sc ${scoreAct==='8'?'active':''}" data-v="8" onclick="evaluar('${q.id}','8')">8</div>
      <div class="btn-sc ${scoreAct==='6'?'active':''}" data-v="6" onclick="evaluar('${q.id}','6')">6</div>
      <div class="btn-sc ${scoreAct==='4'?'active':''}" data-v="4" onclick="evaluar('${q.id}','4')">4</div>
